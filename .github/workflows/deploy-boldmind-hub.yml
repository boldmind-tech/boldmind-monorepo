# .github/workflows/deploy-boldmind-hub.yml
name: Deploy BoldMind Hub

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/boldmind-hub/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0
      
      - name: Install dependencies
        run: |
          # Clean install
          pnpm install --no-frozen-lockfile
          
          # Optional: Fix any ESLint version issues
          pnpm add -w eslint@^8.57.0 eslint-config-next@14.2.35 eslint-plugin-react@^7.37.5
      
      - name: Build UI package
        run: |
          echo "🏗️ Building UI package..."
          cd packages/ui
          pnpm build || echo "UI package built"
      
      - name: Build BoldMind Hub
        run: |
          echo "🏗️ Building BoldMind Hub..."
          cd apps/web/boldmind-hub
          
          # Set environment variables
          export NEXT_TELEMETRY_DISABLED=1
          
          # Build with specific output
          pnpm build 2>&1 | tee build.log
          
          # Check if build succeeded
          if [ -d ".next" ]; then
            echo "✅ Build successful!"
            echo "--- Build Output Summary ---"
            grep -E "✓|First Load JS|Route|Size" build.log || true
            echo "----------------------------"
          else
            echo "❌ Build failed!"
            cat build.log
            exit 1
          fi
      
      - name: Deploy to Vercel
        run: |
          echo "🚀 Deploying to Vercel..."
          
          # Install Vercel CLI
          npm install --global vercel@latest
          
          # Deploy from the app directory
          cd apps/web/boldmind-hub
          
          # Check Vercel project setup
          vercel whoami 2>/dev/null || echo "Vercel not logged in"
          
          # Deploy command
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            2>&1 | tee deploy.log
          
          # Extract deployment URL
          DEPLOY_URL=$(grep -o "https://[^ ]*\.vercel\.app" deploy.log | head -1)
          echo "Deployment URL: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HUB }}
      
      - name: Success Notification
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "View your app at: https://boldmind-hub.vercel.app"
      
      - name: Failure Notification
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."