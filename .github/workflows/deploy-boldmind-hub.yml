# .github/workflows/deploy-boldmind-hub.yml
name: Deploy BoldMind Hub

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/boldmind-hub/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:  # Allow manual triggers

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0
      
      - name: Install dependencies (skip lockfile check)
        run: |
          # Skip the lockfile check since we know versions are standardized
          pnpm install --no-frozen-lockfile
          
          # Update eslint to non-deprecated version
          pnpm add -w eslint@^9.57.0
      
      - name: Build UI package
        run: |
          cd packages/ui
          pnpm build
          echo "✅ UI package built successfully"
      
      - name: Build BoldMind Hub
        run: |
          cd apps/web/boldmind-hub
          
          # Disable telemetry to speed up build
          export NEXT_TELEMETRY_DISABLED=1
          
          echo "🔍 Checking dependencies..."
          # Verify all dependencies are resolved
          pnpm list react next 2>/dev/null || true
          
          echo "🏗️ Building app..."
          pnpm build
          
          # Verify build output
          if [ -d ".next" ]; then
            echo "✅ Build successful!"
            echo "📊 Build size:"
            du -sh .next/
            echo "📁 Build contents:"
            ls -la .next/
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: boldmind-hub-build
          path: |
            apps/web/boldmind-hub/.next
            apps/web/boldmind-hub/public
          retention-days: 7
      
      - name: Deploy to Vercel
        if: success()
        run: |
          echo "🚀 Deploying to Vercel..."
          
          # Install Vercel CLI
          npm install --global vercel@latest
          
          # Navigate to the app directory
          cd apps/web/boldmind-hub
          
          # Deploy with Vercel
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HUB }}
      
      - name: Create deployment status
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              environment_url: 'https://boldmind.ng'
            });

  # Quick test job to verify build works
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-and-deploy
    if: always()
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: boldmind-hub-build
          path: apps/web/boldmind-hub
      
      - name: Verify build
        run: |
          echo "🔍 Verifying build artifacts..."
          
          if [ -d "apps/web/boldmind-hub/.next" ]; then
            echo "✅ Build artifacts verified!"
            echo "Next.js version found:"
            find apps/web/boldmind-hub/.next -name "*.js" | head -5
            
            # Check if static files exist
            if [ -d "apps/web/boldmind-hub/.next/static" ]; then
              echo "📁 Static files present"
              ls -la apps/web/boldmind-hub/.next/static/
            fi
          else
            echo "❌ Build artifacts missing!"
            exit 1
          fi