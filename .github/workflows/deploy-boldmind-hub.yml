# .github/workflows/deploy-boldmind-hub.yml
name: Deploy BoldMind Hub

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/boldmind-hub/**'
      - 'packages/ui/**'
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Needed for git diff
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0
      
      - name: Fix lockfile mismatches
        run: |
          echo "🔧 Fixing lockfile mismatches..."
          
          # Create a unified version configuration
          cat > .versions.json << 'EOF'
          {
            "dependencies": {
              "react": "^18.3.1",
              "react-dom": "^18.3.1",
              "next": "^14.2.35"
            },
            "devDependencies": {
              "@types/node": "^20.11.3",
              "@types/react": "^18.3.27",
              "@types/react-dom": "^18.3.7",
              "typescript": "^5.4.5",
              "autoprefixer": "^10.4.19",
              "postcss": "^8.4.38",
              "tailwindcss": "^3.4.1",
              "eslint": "^8.57.0",
              "eslint-config-next": "14.2.35"
            }
          }
          EOF
          
          # Apply unified versions to ALL packages
          find . -name "package.json" -type f ! -path "*/node_modules/*" | while read pkg; do
            echo "📝 Normalizing $pkg"
            node -e "
              const fs = require('fs');
              const path = require('path');
              const versions = require('./.versions.json');
              
              try {
                const pkgContent = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
                let updated = false;
                
                // Update dependencies
                if (pkgContent.dependencies) {
                  for (const [dep, version] of Object.entries(versions.dependencies)) {
                    if (pkgContent.dependencies[dep]) {
                      if (pkgContent.dependencies[dep] !== version) {
                        console.log(\`  Updating \${dep}: \${pkgContent.dependencies[dep]} → \${version}\`);
                        pkgContent.dependencies[dep] = version;
                        updated = true;
                      }
                    }
                  }
                }
                
                // Update devDependencies
                if (pkgContent.devDependencies) {
                  for (const [dep, version] of Object.entries(versions.devDependencies)) {
                    if (pkgContent.devDependencies[dep]) {
                      if (pkgContent.devDependencies[dep] !== version) {
                        console.log(\`  Updating \${dep}: \${pkgContent.devDependencies[dep]} → \${version}\`);
                        pkgContent.devDependencies[dep] = version;
                        updated = true;
                      }
                    }
                  }
                }
                
                if (updated) {
                  fs.writeFileSync('$pkg', JSON.stringify(pkgContent, null, 2));
                  console.log(\`  ✅ Updated\`);
                }
              } catch (err) {
                console.log(\`  ⚠️ Error: \${err.message}\`);
              }
            "
          done
      
      - name: Clean install with force
        run: |
          # Remove existing node_modules and lockfile
          rm -rf node_modules apps/*/node_modules packages/*/node_modules
          rm -f pnpm-lock.yaml
          
          # Install with force to regenerate lockfile
          pnpm install --force --no-frozen-lockfile
      
      - name: Build UI package first
        run: |
          echo "🏗️ Building UI package..."
          cd packages/ui
          pnpm build
          echo "✅ UI package built"
      
      - name: Build BoldMind Hub
        run: |
          echo "🏗️ Building BoldMind Hub..."
          cd apps/web/boldmind-hub
          
          # Check if there are still version mismatches
          echo "🔍 Checking for version mismatches..."
          pnpm install --dry-run 2>&1 | grep -i "mismatch" || true
          
          # Build with specific Next.js cache settings
          NEXT_TELEMETRY_DISABLED=1 pnpm build
          
          # Verify build
          if [ -d ".next" ]; then
            echo "✅ Build successful!"
            echo "📊 Build output:"
            ls -la .next/
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
      
      - name: Deploy to Vercel
        run: |
          echo "🚀 Deploying to Vercel..."
          npm install -g vercel@latest
          
          # Deploy from the app directory
          cd apps/web/boldmind-hub
          
          # Check if we should force deploy
          FORCE_DEPLOY=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            FORCE_DEPLOY="--prod --yes"
          fi
          
          vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            $FORCE_DEPLOY \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID_HUB }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HUB }}